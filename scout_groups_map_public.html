<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scout Groups Map (Public)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        .group-list {
            display: none;
            position: fixed;
            top: 90px;
            left: 10px;
            max-height: 65vh;
            overflow-y: auto;
            width: 300px;
            background: rgba(219,226,233, 0.4);
            padding: 10px;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            direction: rtl;
            text-align: left;
            border-radius: 5px;
            z-index: 1000;
        }
        .group-list-item {
            word-break: break-word;
            cursor: pointer;
            margin: 5px 0;
            direction: ltr;
            text-align: left;
        }
        .info-box {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background-color: rgba(255,255,255,0.9);
            padding: 10px;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            z-index: 1000;
        }
        #toggle-button {
            position: fixed;
            top: 45px;
            left: 60px;
            z-index: 1101;
            padding: 10px 15px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>

    var markers = L.markerClusterGroup();
    var markerMap = {};

    L.geoJSON(scoutGroupsData, {
        onEachFeature: function (feature, layer) {
            var popupContent = "<b>" + feature.properties.district_name + "</b><br><ul>";
            var sortedGroups = feature.properties.group_details.sort(function(a, b) {
                return a['Scout Group Name'].localeCompare(b['Scout Group Name']);
            });
            sortedGroups.forEach(function(detail) {
                var groupName = detail['Scout Group Name'];
                popupContent += "<li>" + groupName + "</li>";
                markerMap[groupName.toLowerCase()] = layer;
            });
            popupContent += "</ul>";
            layer.bindPopup(popupContent);
        },
        pointToLayer: function (feature, latlng) {
            var marker = L.marker(latlng, {
                icon: L.divIcon({
                    html: "<div style='background-color:blue;color:white;border-radius:50%;text-align:center;width:30px;height:30px;line-height:30px;'>" + feature.properties.count + "</div>",
                    className: 'marker-icon'
                })
            });
            markers.addLayer(marker);
            return marker;
        }
    }).addTo(markers);

    map.addLayer(markers);

    function toggleGroupList() {
        var list = document.getElementById('group-list');
        if (list.style.display === 'none' || list.style.display === '') {
            list.innerHTML = '<b>Scout Groups List</b><br>';
            allGroupNames.forEach(function(groupName) {
                var item = document.createElement('div');
                item.className = 'group-list-item';
                item.textContent = groupName;
                item.onclick = function() {
                    var layer = markerMap[groupName.toLowerCase()];
                    if (layer) {
                        map.closePopup();
                        markers.zoomToShowLayer(layer, function() {
                            map.setView(layer.getLatLng(), 14);
                            layer.openPopup();
                        });
                    }
                };
                list.appendChild(item);
            });
            list.style.display = 'block';
        } else {
            list.style.display = 'none';
        }
    }

    document.getElementById('toggle-button').addEventListener('click', toggleGroupList);
